services:
  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: bilibay-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: bilibay
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - bilibay-network

  # Database Seeder
  seeder:
    build:
      context: .
      target: seeder
    container_name: bilibay-seeder
    restart: "no"
    environment:
      MONGO_URI: mongodb://admin:password123@mongodb:27017/bilibay?authSource=admin
      NODE_ENV: production
    depends_on:
      mongodb:
        condition: service_started
    volumes:
      - backend_logs:/app/logs
    networks:
      - bilibay-network
    command: sh -c "pnpm --filter @bilibay/backend seed"

  # BiliBay App (combined frontend and backend)
  app:
    build:
      context: .
      target: production
    container_name: bilibay-app
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      MONGO_URI: mongodb://admin:password123@mongodb:27017/bilibay?authSource=admin
      JWT_SECRET: 01ma4c+LAGMhWGui/glIqDKSShUVE32XbThqs8/d77g=
      EMAIL_HOST: smtp.gmail.com
      EMAIL_PORT: 587
      EMAIL_USER: your-email@gmail.com
      EMAIL_PASS: your-app-password-here
      FRONTEND_URL: http://localhost
    ports:
      - "80:80"
    depends_on:
      seeder:
        condition: service_completed_successfully
    volumes:
      - backend_logs:/app/logs
    networks:
      - bilibay-network
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:80",
        ]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  mongodb_data:
    driver: local
  backend_logs:
    driver: local

networks:
  bilibay-network:
    driver: bridge
