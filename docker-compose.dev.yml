version: '3.8'

services:
  # MongoDB Database for Development
  mongodb-dev:
    image: mongo:7.0
    container_name: bilibay-mongodb-dev
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: bilibay
    ports:
      - "27017:27017"
    volumes:
      - mongodb_dev_data:/data/db
    networks:
      - bilibay-dev-network

  # Backend Development (with hot reload)
  backend-dev:
    build:
      context: .
      target: base
    container_name: bilibay-backend-dev
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 3000
      MONGO_URI: mongodb://admin:password123@mongodb-dev:27017/bilibay?authSource=admin
      JWT_SECRET: 01ma4c+LAGMhWGui/glIqDKSShUVE32XbThqs8/d77g=
      EMAIL_HOST: smtp.gmail.com
      EMAIL_PORT: 587
      EMAIL_USER: your-email@gmail.com
      EMAIL_PASS: your-app-password-here
      FRONTEND_URL: http://localhost:5173
    ports:
      - "3000:3000"
    depends_on:
      - mongodb-dev
    volumes:
      - .:/app
      - /app/node_modules
      - backend_dev_logs:/app/apps/backend/logs
    networks:
      - bilibay-dev-network
    command: pnpm --filter @bilibay/backend dev

  # Frontend Development (with hot reload)
  frontend-dev:
    build:
      context: .
      target: base
    container_name: bilibay-frontend-dev
    restart: unless-stopped
    environment:
      NODE_ENV: development
    ports:
      - "5173:5173"
    depends_on:
      - backend-dev
    volumes:
      - .:/app
      - /app/node_modules
    networks:
      - bilibay-dev-network
    command: pnpm --filter @bilibay/frontend dev --host 0.0.0.0

volumes:
  mongodb_dev_data:
    driver: local
  backend_dev_logs:
    driver: local

networks:
  bilibay-dev-network:
    driver: bridge